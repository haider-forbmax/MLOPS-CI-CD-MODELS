githubConfigUrl: "https://github.com/haider-forbmax/MLOPS-CI-CD-MODELS"
githubConfigSecret: github-token-secret
runnerScaleSetName: fr-api-runners
minRunners: 1
maxRunners: 5

# Set to "dind" to disable the problematic K8s hooks that cause the HttpError
containerMode:
  type: "dind" 

template:
  spec:
    serviceAccountName: fr-api-runners-gha-rs-kube-mode
    securityContext:
      fsGroup: 1001
    containers:
      - name: runner
        # UPDATED: Use your Harbor image and the 'v1' tag
        image: harbor.nimar.gov.pk/mlops/actions-runner-kaniko:v1
        command: ["/home/runner/run.sh"]
        env:
          - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
            value: "false"
          # IMPORTANT: Setting this to empty string disables the index.js hooks
          - name: ACTIONS_RUNNER_CONTAINER_HOOKS
            value: ""
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
    volumes:
      - name: work
        ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: standard
              resources:
                requests:
                  storage: 5Gi