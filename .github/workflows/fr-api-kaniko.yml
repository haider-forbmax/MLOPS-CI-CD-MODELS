name: Build & Push fr-api with Kaniko

on:
  push:
    branches: [ main ]
    paths:
      - 'mlops/APIs/fr-api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: fr-api-runners

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Push with Kaniko
        run: |
          echo "🔧 Setting up Kaniko Docker config..."

          mkdir -p /kaniko/.docker

          # Create auth file for Harbor
          AUTH=$(echo -n '${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}' | base64 | tr -d '\n')
          cat <<EOF > /kaniko/.docker/config.json
          {
            "auths": {
              "harbor.nimar.gov.pk": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

          echo "🚀 Starting Kaniko build & push..."

          kaniko-executor \
            --context ${{ github.workspace }}/mlops/APIs/fr-api \
            --dockerfile ${{ github.workspace }}/mlops/APIs/fr-api/Dockerfile \
            --destination harbor.nimar.gov.pk/mlops/fr-client:latest \
            --destination harbor.nimar.gov.pk/mlops/fr-client:${{ github.sha }} \
            --cache=true \
            --cache-repo=harbor.nimar.gov.pk/mlops/fr-client-cache \
            --insecure-registry harbor.nimar.gov.pk \
            --push-retry=3 \
            --verbosity=info
