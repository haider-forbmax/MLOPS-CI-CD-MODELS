name: Build & Push fr-api with Kaniko

on:
  push:
    branches: [ main ]
    paths:
      - 'mlops/APIs/fr-api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: fr-api-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kaniko Auth
        run: |
          # Create the config directory in the runner's home
          mkdir -p ~/.docker
          
          # Encode the Harbor robot credentials
          # IMPORTANT: Replace YOUR_ROBOT_SECRET with your actual Harbor secret
          AUTH=$(echo -n 'robot$mlops+mlops:YOUR_ROBOT_SECRET' | base64)
          
          # Write the config file
          echo "{\"auths\":{\"harbor.nimar.gov.pk\":{\"auth\":\"$AUTH\"}}}" > ~/.docker/config.json
          
          # Kaniko specifically looks for credentials in /kaniko/.docker/config.json.
          # We use sudo to copy it to the system path prepared in your Dockerfile.
          sudo mkdir -p /kaniko/.docker
          sudo cp ~/.docker/config.json /kaniko/.docker/config.json
          sudo chown -R runner:runner /kaniko

      - name: Build and Push with Kaniko
        run: |
          # Execute the Kaniko binary directly from the local filesystem.
          # We use absolute paths via github.workspace to ensure context is found.
          /kaniko/executor \
            --context "${{ github.workspace }}/mlops/APIs/fr-api" \
            --dockerfile "${{ github.workspace }}/mlops/APIs/fr-api/Dockerfile" \
            --destination "harbor.nimar.gov.pk/mlops/fr-client:latest" \
            --destination "harbor.nimar.gov.pk/mlops/fr-client:${{ github.sha }}" \
            --cache=true \
            --cache-repo="harbor.nimar.gov.pk/mlops/fr-client-cache" \
            --insecure-registry "harbor.nimar.gov.pk" \
            --push-retry=3 \
            --verbosity=info
            
