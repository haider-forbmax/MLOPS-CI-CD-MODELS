name: Build & Push Models with Kaniko

on:
  push:
    branches: [ main ]
    paths:
      - 'mlops/APIs/**'
  workflow_dispatch:

jobs:
  # Detect which models changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            doc-ocr:
              - 'mlops/APIs/doc-ocr/**'
            emotion-api:
              - 'mlops/APIs/emotion-api/**'
            fr-openai-api:
              - 'mlops/APIs/fr-api/**'
            logo-openai-api:
              - 'mlops/APIs/logo/**'
            ocr-media:
              - 'mlops/APIs/ocr-media/**'
            # ===================== ADD YOUR REMAINING 10 MODELS HERE =====================
            # your-model-name:
            #   - 'mlops/APIs/your-folder-name/**'

  # Build only the changed models
  build-and-push:
    needs: changes
    runs-on: api-runners
    if: needs.changes.outputs.models != '[]'
    strategy:
      matrix:
        model: ${{ fromJSON(needs.changes.outputs.models) }}
      fail-fast: false
      max-parallel: 2

    env:
      # Adjust these mappings according to your models
      MODEL_NAME: >-
        ${{ matrix.model == 'doc-ocr' && 'doc-ocr-api' ||
            matrix.model == 'emotion-api' && 'emotion-api' ||
            matrix.model == 'logo-openai-api' && 'logo-openai-api' ||
            matrix.model == 'ocr-media' && 'ocr-media-api' ||
            matrix.model == 'fr-openai-api' && 'fr-openai-api' || matrix.model }}
      FOLDER: >-
        ${{ matrix.model == 'doc-ocr' && 'doc-ocr' ||
            matrix.model == 'emotion-api' && 'emotion-api' ||
            matrix.model == 'logo-openai-api' && 'logo' ||
            matrix.model == 'ocr-media' && 'ocr-media' ||
            matrix.model == 'fr-openai-api' && 'fr-api' || matrix.model }}
      CONTEXT_PATH: >-
        ${{ matrix.model == 'emotion-api' && 'emotion_inference' || '.' }}
      DOCKERFILE_PATH: >-
        ${{ matrix.model == 'emotion-api' && 'emotion_inference/Dockerfile' || 'Dockerfile' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kaniko Auth
        run: |
          sudo mkdir -p /kaniko/.docker /root/.docker

          H_USER="${{ secrets.HARBOR_USERNAME }}"
          H_PASS="${{ secrets.HARBOR_PASSWORD }}"
          D_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          D_PASS="${{ secrets.DOCKERHUB_TOKEN }}"

          if [ -z "$H_USER" ] || [ -z "$H_PASS" ]; then
            echo "Error: Harbor credentials missing."
            exit 1
          fi

          H_AUTH=$(echo -n "${H_USER}:${H_PASS}" | base64 -w 0)

          DOCKER_AUTH_SECTION=""
          if [ -n "$D_USER" ] && [ -n "$D_PASS" ]; then
            D_AUTH=$(echo -n "${D_USER}:${D_PASS}" | base64 -w 0)
            DOCKER_AUTH_SECTION="\"https://index.docker.io/v1/\": {\"auth\": \"$D_AUTH\"},"
          fi

          # Create config.json properly
          cat <<EOF | sudo tee /kaniko/.docker/config.json
          {
            "auths": {
              ${DOCKER_AUTH_SECTION}
              "harbor.nimar.gov.pk": {
                "auth": "$H_AUTH"
              }
            }
          }
          EOF

          sudo cp /kaniko/.docker/config.json /root/.docker/config.json
          sudo chown -R root:root /kaniko /root/.docker

      - name: Build and Push with Kaniko
        run: |
          # Fix for messagebus error
          if [ -f /var/lib/dpkg/statoverride ]; then
            sudo sed -i '/messagebus/d' /var/lib/dpkg/statoverride || true
          fi

          sudo -E HOME=/kaniko /kaniko/executor \
            --context "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}" \
            --dockerfile "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.DOCKERFILE_PATH }}" \
            --destination "harbor.nimar.gov.pk/mlops/${{ env.MODEL_NAME }}:latest" \
            --force \
            --cache=false \
            --snapshot-mode=full \
            --custom-platform=linux/amd64 \
            --insecure-registry "harbor.nimar.gov.pk" \
            --push-retry=3 \
            --verbosity=info \
            --ignore-path=/product_uuid \
            --ignore-path=/proc \
            --ignore-path=/sys \
            --ignore-path=/
