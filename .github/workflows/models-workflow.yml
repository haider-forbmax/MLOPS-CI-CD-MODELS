name: Build & Push Models with Docker

on:
  push:
    branches: [ main ]
    paths:
      - 'mlops/APIs/**'
  workflow_dispatch:

jobs:
  # Detect which models changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            doc-ocr:
              - 'mlops/APIs/doc-ocr/**'
            emotion-api:
              - 'mlops/APIs/emotion-api/**'
            fr-openai-api:
              - 'mlops/APIs/fr-api/**'
            logo-openai-api:
              - 'mlops/APIs/logo/**'
            ocr-media:
              - 'mlops/APIs/ocr-media/**'
            scene-api:
              - 'mlops/APIs/scene-api/**'
            sentiment-api:
              - 'mlops/APIs/sentiment-api/**'
            # ===================== ADD YOUR REMAINING 10 MODELS HERE =====================
            # your-model-name:
            #   - 'mlops/APIs/your-folder-name/**'

  # Build only the changed models
  build-and-push:
    needs: changes
    runs-on: api-runners
    if: needs.changes.outputs.models != '[]'
    strategy:
      matrix:
        model: ${{ fromJSON(needs.changes.outputs.models) }}
      fail-fast: false
      max-parallel: 2

    env:
      # Adjust these mappings according to your models
      MODEL_NAME: >-
        ${{ matrix.model == 'doc-ocr' && 'doc-ocr-api' ||
            matrix.model == 'emotion-api' && 'emotion-api' ||
            matrix.model == 'logo-openai-api' && 'logo-openai-api' ||
            matrix.model == 'ocr-media' && 'ocr-media-api' ||
            matrix.model == 'scene-api' && 'scene-detection-api' ||
            matrix.model == 'sentiment-api' && 'sentiment-api' ||
            matrix.model == 'fr-openai-api' && 'fr-openai-api' || matrix.model }}
      FOLDER: >-
        ${{ matrix.model == 'doc-ocr' && 'doc-ocr' ||
            matrix.model == 'emotion-api' && 'emotion-api' ||
            matrix.model == 'logo-openai-api' && 'logo' ||
            matrix.model == 'ocr-media' && 'ocr-media' ||
            matrix.model == 'scene-api' && 'scene-api' ||
            matrix.model == 'sentiment-api' && 'sentiment-api' ||
            matrix.model == 'fr-openai-api' && 'fr-api' || matrix.model }}
      CONTEXT_PATH: >-
        ${{ matrix.model == 'emotion-api' && 'emotion_inference' || '.' }}
      DOCKERFILE_PATH: >-
        ${{ matrix.model == 'emotion-api' && 'emotion_inference/Dockerfile' || 'Dockerfile' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Info
        run: |
          docker version
          docker info

      - name: Debug Build Context
        run: |
          echo "GITHUB_WORKSPACE=${{ github.workspace }}"
          echo "GITHUB_SHA=${{ github.sha }}"
          echo "GITHUB_REF=${{ github.ref }}"
          echo "MODEL_NAME=${{ env.MODEL_NAME }}"
          echo "FOLDER=${{ env.FOLDER }}"
          echo "CONTEXT_PATH=${{ env.CONTEXT_PATH }}"
          echo "DOCKERFILE_PATH=${{ env.DOCKERFILE_PATH }}"
          echo "RUNNER_NAME=${{ runner.name }}"
          echo "RUNNER_OS=${{ runner.os }}"
          echo "---- repo root ----"
          ls -la "${{ github.workspace }}"
          echo "---- git status ----"
          git -C "${{ github.workspace }}" status --short
          echo "---- last commit ----"
          git -C "${{ github.workspace }}" log -1 --stat
          echo "---- model folder ----"
          ls -la "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}"
          echo "---- build context ----"
          ls -la "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}"
          if [ -f "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/.dockerignore" ]; then
            echo "---- .dockerignore ----"
            sed -n '1,200p' "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/.dockerignore"
          fi
          echo "---- Dockerfile ----"
          sed -n '1,200p' "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.DOCKERFILE_PATH }}"
          if [ -f "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}/requirements.txt" ]; then
            echo "---- requirements.txt ----"
            sed -n '1,200p' "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}/requirements.txt"
          fi
          echo "---- context files ----"
          find "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}" -maxdepth 2 -type f | sort
          echo "---- context size ----"
          du -sh "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}"
          if [ "${{ matrix.model }}" = "doc-ocr" ]; then
            echo "---- doc-ocr file hashes ----"
            sha256sum \
              "${{ github.workspace }}/mlops/APIs/doc-ocr/Dockerfile" \
              "${{ github.workspace }}/mlops/APIs/doc-ocr/requirements.txt" \
              "${{ github.workspace }}/mlops/APIs/doc-ocr/app.py"
            echo "---- doc-ocr top-level disk usage ----"
            du -sh "${{ github.workspace }}/mlops/APIs/doc-ocr"/*
          fi

      - name: Login to Harbor
        run: |
          if [ -z "${{ secrets.HARBOR_USERNAME }}" ] || [ -z "${{ secrets.HARBOR_PASSWORD }}" ]; then
            echo "Error: Harbor credentials missing."
            exit 1
          fi

          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.nimar.gov.pk \
            -u "${{ secrets.HARBOR_USERNAME }}" \
            --password-stdin

      - name: Build Image
        run: |
          docker build \
            --file "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.DOCKERFILE_PATH }}" \
            --tag "harbor.nimar.gov.pk/mlops/${{ env.MODEL_NAME }}:latest" \
            "${{ github.workspace }}/mlops/APIs/${{ env.FOLDER }}/${{ env.CONTEXT_PATH }}"

      - name: Push Image
        run: |
          docker push "harbor.nimar.gov.pk/mlops/${{ env.MODEL_NAME }}:latest"
