name: Build & Push Models with Kaniko

on:
  push:
    branches: [ main ]
    paths:
      - 'mlops/APIs/**'
  workflow_dispatch:  
jobs:
  build-and-push:
    runs-on: api-runners
    strategy:
      matrix:
        include:
          - model_name: doc-ocr-api
            folder: doc-ocr
            dockerfile_path: Dockerfile
            image_repo: doc-ocr-api
            paths: "mlops/APIs/doc-ocr/**"

          - model_name: emotion-api
            folder: emotion-api
            dockerfile_path: emotion_inference/Dockerfile
            image_repo: emotion-api
            paths: "mlops/APIs/emotion-api/**"

          - model_name: fr-openai-api
            folder: fr-api
            dockerfile_path: Dockerfile
            image_repo: fr-openai-api
            paths: "mlops/APIs/fr-api/**"

          # Add your other 10 models similarly with their own "paths"

      fail-fast: false
      max-parallel: 3

    # Only run the job if files in that model's path were changed
    if: contains(github.event.paths, matrix.paths) || github.event_name == 'workflow_dispatch'
    
    env:
      MODEL_NAME: ${{ matrix.model_name }}
      CONTEXT_PATH: mlops/APIs/${{ matrix.folder }}
      DOCKERFILE_PATH: mlops/APIs/${{ matrix.folder }}/${{ matrix.dockerfile_path }}
      IMAGE_REPO: ${{ matrix.image_repo }}

      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kaniko Auth
        run: |
          sudo mkdir -p /kaniko/.docker
          
          H_USER="${{ secrets.HARBOR_USERNAME }}"
          H_PASS="${{ secrets.HARBOR_PASSWORD }}"
          D_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          D_PASS="${{ secrets.DOCKERHUB_TOKEN }}"
          
          if [ -z "$H_USER" ] || [ -z "$H_PASS" ]; then
            echo "Error: Harbor credentials missing."
            exit 1
          fi
          
          H_AUTH=$(echo -n "${H_USER}:${H_PASS}" | base64 -w 0)
          
          DOCKER_AUTH_SECTION=""
          if [ -n "$D_USER" ] && [ -n "$D_PASS" ]; then
            D_AUTH=$(echo -n "${D_USER}:${D_PASS}" | base64 -w 0)
            DOCKER_AUTH_SECTION="\"https://index.docker.io/v1/\": {\"auth\": \"$D_AUTH\"},"
          fi
          
          cat <<EOF | sudo tee /kaniko/.docker/config.json
          {
            "auths": {
              $DOCKER_AUTH_SECTION
              "harbor.nimar.gov.pk": {
                "auth": "$H_AUTH"
              }
            }
          }
          EOF
          
          sudo mkdir -p /root/.docker
          sudo cp /kaniko/.docker/config.json /root/.docker/config.json
          sudo chown -R $USER:$USER /kaniko

      - name: Build and Push with Kaniko
        run: |
          # Fix for 'unknown system group messagebus' error
          if [ -f /var/lib/dpkg/statoverride ]; then
            sudo sed -i '/messagebus/d' /var/lib/dpkg/statoverride || true
          fi
          
          sudo -E HOME=/kaniko /kaniko/executor \
            --context "${{ github.workspace }}/${{ env.CONTEXT_PATH }}" \
            --dockerfile "${{ github.workspace }}/${{ env.DOCKERFILE_PATH }}" \
            --destination "harbor.nimar.gov.pk/mlops/${{ env.IMAGE_REPO }}:latest" \
            --force \
            --cache=false \
            --snapshot-mode=full \
            --custom-platform=linux/amd64 \
            --insecure-registry "harbor.nimar.gov.pk" \
            --push-retry=3 \
            --verbosity=info \
            --ignore-path=/product_uuid \
            --ignore-path=/proc \
            --ignore-path=/sys \
            --ignore-path=/
