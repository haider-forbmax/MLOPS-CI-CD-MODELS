name: Build & Push fr-api 

on:
  push:
    branches:
      - main
    paths:
      - 'mlops/APIs/fr-api/**'
  pull_request:
    branches:
      - main
    paths:
      - 'mlops/APIs/fr-api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==================== DOCKER HUB LOGIN (Commented) ====================
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==================== HARBOR LOGIN (Active) ====================
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbour.nimar.gov.pk
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # ==================== BUILD & PUSH ====================
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./mlops/APIs/fr-api
          file: ./mlops/APIs/fr-api/Dockerfile
          push: true
          # ==================== Docker Hub Tags (Commented) ====================
          # tags: |
          #   haiderali11/fr-client:latest
          #   haiderali11/fr-client:${{ github.sha }}

          # ==================== Harbor Tags (Active) ====================
          tags: |
            harbour.nimar.gov,pk/mlops/fr-test-client:latest
            harbour.nimar.gov.pk/mlops/fr-test-client:${{ github.sha }}

          # Cache configuration
          cache-from: type=registry,ref=harbour.forbmax.ai/mlops/fr-client:latest
          cache-to: type=inline
