name: Build & Push fr-api to Harbor

on:
  push:
    branches:
      - main
    paths:
      - 'mlops/APIs/fr-api/**'      # Only trigger if files in fr-api change
  pull_request:
    branches:
      - main
    paths:
      - 'mlops/APIs/fr-api/**'
  workflow_dispatch:                # Allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: self-hosted             # Or use your custom label: [self-hosted, fr-api-builder]

    defaults:
      run:
        working-directory: ./mlops/APIs/fr-api   # So we don't need to cd everywhere

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Optional but useful

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.forbmax.ai
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .                          # Current working dir = fr-api folder
          file: ./Dockerfile
          push: true
          tags: harbor.forbmax.ai/mlops/fr-client:latest
          # Optional: Add cache for faster builds
          cache-from: type=registry,ref=harbour.forbmax.ai/mlops/fr-client:latest
          cache-to: type=inline
