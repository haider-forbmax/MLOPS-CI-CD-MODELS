name: Build & Push fr-api to Harbor

on:
  push:
    branches:
      - main
    paths:
      - 'mlops/APIs/fr-api/**'
  pull_request:
    branches:
      - main
    paths:
      - 'mlops/APIs/fr-api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==================== DOCKER HUB (Fully Commented - Ready to reuse) ====================
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==================== HARBOR LOGIN ====================
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.nimar.gov.pk        # ← Changed to the correct registry
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}


      # ==================== Docker Hub Tags (Commented) ====================
          # tags: |
          #   haiderali11/fr-client:latest
          #   haiderali11/fr-client:${{ github.sha }}

      # ==================== BUILD & PUSH ====================
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./mlops/APIs/fr-api
          file: ./mlops/APIs/fr-api/Dockerfile
          push: true
          tags: |
            harbor.nimar.gov.pk/mlops/fr-client:latest
            harbor.nimar.gov.pk/mlops/fr-client:${{ github.sha }}
          cache-from: type=registry,ref=harbor.nimar.gov.pk/mlops/fr-client:latest
          cache-to: type=inline
