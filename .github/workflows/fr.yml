name: Build & Push fr-api with Kaniko

on:
  push:
    branches: [ main ]
    paths:
      - 'mlops/APIs/fr-api/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mlops/APIs/fr-api/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: fr-api-runners

    # Run the whole job inside Kaniko executor
    container:
      image: gcr.io/kaniko-project/executor:v1.23.0-debug
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Push with Kaniko
        run: |
          # Create Docker config for Harbor authentication
          mkdir -p /kaniko/.docker

          cat <<EOF > /kaniko/.docker/config.json
          {
            "auths": {
              "harbor.nimar.gov.pk": {
                "auth": "$(echo -n '${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}' | base64)"
              }
            }
          }
          EOF

          /kaniko/executor \
            --context ./mlops/APIs/fr-api \
            --dockerfile ./mlops/APIs/fr-api/Dockerfile \
            --destination harbor.nimar.gov.pk/mlops/fr-client:latest \
            --destination harbor.nimar.gov.pk/mlops/fr-client:${{ github.sha }} \
            --cache=true \
            --cache-repo=harbor.nimar.gov.pk/mlops/fr-client-cache \
            --insecure-registry harbor.nimar.gov.pk \
            --skip-unused-cache \
            --push-retry=3
