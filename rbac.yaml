apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-container-role
  namespace: arc-runners
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec", "pods/log", "secrets", "configmaps"]
  verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-container-binding
  namespace: arc-runners
subjects:
- kind: ServiceAccount
  name: fr-api-runners-gha-rs-kube-mode
  namespace: arc-runners
roleRef:
  kind: Role
  name: runner-container-role
  apiGroup: rbac.authorization.k8s.io